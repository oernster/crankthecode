[pytest]
# The repo currently contains a `.pytest_cache/` directory that is not writable
# in this environment, causing `PytestCacheWarning`.
#
# Point pytest's cache to a writable directory inside the workspace.
cache_dir = .pytest_cache_writable

# Default test run should enforce 100% coverage without requiring callers to
# remember `--cov`.
addopts =
    --cov=app
    --cov-report=term-missing:skip-covered
    --cov-fail-under=100


